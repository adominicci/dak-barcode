meta:
  version: 1
  purpose: Canonical fast-reload memory bundle for fresh contexts in this repository.
  status: active
  last_updated_at: 2026-05-14
  default_reload_order:
    - AGENTS.md
    - docs/project-state.yaml
    - docs/current-context.md
    - docs/decisions.md
    - active Linear issue/comments
    - git branch, diff, and recent commits
    - code inspection for touched areas
  retrieval_score_formula: "0.40R + 0.25A + 0.20F + 0.15G - 0.20T - 0.30S"
  retrieval_score_terms:
    R: semantic relevance to the current task
    A: authority of the source
    F: freshness of the source
    G: graph proximity to touched files, routes, and issues
    T: token cost to load the source
    S: staleness or conflict penalty
  contradiction_trust_order:
    - confirmed current code plus verified external behavior
    - newest applicable entry in docs/decisions.md
    - current docs/project-state.yaml
    - older narrative docs
  freshness_sensors:
    - git branch, diff, and recent commits
    - active Linear issue and comments
  memory_impact_analysis:
    triggers:
      - repo-tracked files changed
      - task scope changed
      - active issue changed
      - new backend or API behavior was discovered
      - docs and code disagree
      - PR review or bug report changed accepted understanding
    outputs:
      - No update needed
      - Update current-context only
      - Append decisions log and update current-context
      - Update project-state and current-context
      - Escalate: constitutional docs also need updates
    ownership_rules:
      behavior_or_runtime_change: update docs/project-state.yaml
      temporary_focus_or_risk: update docs/current-context.md
      durable_decision_or_tradeoff: append docs/decisions.md
      product_or_architecture_contract_change: update docs/architecture.md and-or docs/prd.md

product:
  last_verified_at: 2026-05-14
  verified_against:
    - AGENTS.md
    - README.md
    - docs/prd.md
  confidence: high
  repo_ownership: Frontend-only SvelteKit rebuild of the DST Stage and Load barcode module.
  primary_device: shared iPad A16 with hardware barcode scanner input
  secondary_device: desktop browser for debugging and implementation support
  operating_rules:
    - always-online app
    - Home is the stable re-entry page for active sessions
    - Staging does not require a loader
    - Loading requires explicit loader selection before entry
    - operational loader pickers expose only loaders whose lookup row has `isActive: true`
    - non-admin warehouse selection is resolved from the Supabase profile
    - only admin users may access the location or environment selector
  implemented_surfaces:
    - auth shell plus login, logout, forgot-password, reset-password, change-password, and inactive gate
    - profile-based routing with admin target selection and operator warehouse resolution
    - Home, Location, Account, Add Loader, Will Call, Dropsheets, Select Category, Staging, Loading, Order Status, and Move Orders
    - staging and loading scan loops with hardware-scanner-first interaction
    - Loading uses a viewport-height iPad workflow panel with internal part-list scrolling and a flex bottom counter dock so drop navigation and counters remain reachable without page-level scrolling
    - Loading treats the Select Category route `locationId` as authoritative for label lookup, visible label filtering, and scan/retry payloads
    - Loading renders selected-location union label rows even when legacy LoadViewDetail counters are zero, and counter cards use matching barcode-derived active-drop counters when available
    - Dropsheets carries the backend `transfer` boolean into Select Category route data, preserves it through the Loading return handoff, and uses it to trigger transfer label repair export after Complete Load notification
  intentionally_limited:
    - some support pages still rely on DST-backed read models while loading mixes DST, CustomerPortalAPI-PY, and dak-web data
    - Dropsheets trailer picker reads equipment options from dakview-web `X-Db: EQUIPMENT` and updates selected trailer fields through dakview-web `POST /v1/logistics/dropsheet-trailer-update`; the Dropsheets iPad table keeps delivery, drop weight, load number, trailer, completion, loaded timestamp, loader, and go action on one row

architecture:
  last_verified_at: 2026-05-14
  verified_against:
    - docs/architecture.md
    - src/lib/server/auth-context.ts
    - src/lib/server/proxy.ts
    - src/lib/trailers.cached.ts
    - src/routes/(app)/+layout.server.ts
  confidence: high
  stack:
    framework: SvelteKit 5
    language: TypeScript strict
    runtime: Node.js 24
    package_manager: Bun
    styling: Tailwind CSS 4
    ui: shadcn-svelte on Bits UI
    auth: Supabase Auth via @supabase/ssr
  routing_model:
    - authenticated requests are gated in hooks.server.ts and layout server loads
    - the browser never calls Heroku backends directly
    - server-side proxy helpers normalize target formatting for each backend
  state_rules:
    - workflow state is intentionally disposable and mostly in memory
    - auth and target resolution are server-side concerns
    - operator-facing loaders, trailers, and drop-area lookups now fetch fresh remote query state instead of hydrating from browser cache
    - Svelte remote functions require `compilerOptions.experimental.async` alongside `kit.experimental.remoteFunctions`, and operator-facing remote-query banners must use shared sanitized messaging instead of raw framework URLs
    - imperative reads from SvelteKit remote `query(...)` helpers must use `src/lib/remote-query-read.ts` so the app supports the installed promise-like query contract and future `.run()`-capable contracts
    - target-sensitive lookup wrappers must include a target cache qualifier in the serialized remote `query(...)` input so deployed clients cannot reuse the wrong reactive query instance across target changes
    - trailer lookup wrappers require an active target and fail before the remote call when no target is available, preventing a silent Canton equipment fallback
    - Dropsheets trailer lookup targets dakview-web `X-Db: EQUIPMENT` while using the active app target only as the equipment `location` filter; unusable equipment rows with blank/missing id or name are skipped so one dirty lookup row does not fail the picker
    - Dropsheets trailer updates target the active dak-web database header and send `DropSheetID`, `trailer_id`, `trailer_name`, and `trailer_url`
    - Dropsheet list mapping preserves the FastAPI `transfer` boolean and defaults it to false when old payloads omit it
    - Complete Load uses separate awaited remote commands for loaded notify and transfer-label export; transfer export uses `mode: repair_missing_target`, active-target `X-Db`, and `Y-Db: AZURE`
    - `fetchDak` defaults to an 8s timeout but supports per-call timeout overrides for long-running Complete Load notify/export calls
    - Loading label lookup, visible label filtering, scan payloads, retry payloads, and fallback refresh keys use the Select Category route `locationId` as authoritative; returned drop-detail `LocationID` must not override the selected loading location
    - CustomerPortalAPI-PY combined loading refresh responses must query `vwLoadLabelsUnion` and return `load_view_union_key.location_id` using the request `LocationID`; the selected detail row may only supply `LoadNumber` and `DSSequence`
    - CustomerPortalAPI-PY exposes additive read-only `POST /api/barcode-update/loadview-barcode-counters`; Loading only uses its barcode-derived counters when `DropSheetID`, `LoadNumber`, `DSSequence`, and selected route `LocationID` match the active drop
    - standalone and combined-scan barcode counter responses without a usable `LoadNumber` are rejected, and separate post-scan counter refresh failures are isolated so required detail/union refreshes still gate queued scan draining
    - Dropsheets and Select Category Loading entry use shared active-loader option derivation so inactive loader rows are not selectable for new assignments or sessions
  access_states:
    - anonymous
    - inactive
    - operator-ready
    - admin-needs-target
    - admin-ready

