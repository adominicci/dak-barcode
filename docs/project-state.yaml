workflows:
  last_verified_at: 2026-05-14
  verified_against:
    - AGENTS.md
    - src/routes/(app)/select-category/[dropsheetId]/+page.svelte
    - src/routes/(app)/staging/+page.svelte
    - src/routes/(app)/loading/+page.svelte
    - src/lib/workflow/staging-scan-controller.ts
    - src/lib/workflow/loading-scan-controller.ts
  confidence: high
  home:
    status: live
    notes:
      - exposes Staging, Loading, Add Loader, and the live Will Call workflow entry
      - acts as the stable landing page after re-entry
      - includes a header-level sign out action that posts to the shared `/logout` route
      - uses compact blue iPad action cards and full-width page layout instead of a centered narrow card island
  staging:
    status: live
    rules:
      - department selection is required on entry
      - numeric scans are location codes
      - any valid drop area is accepted
      - when a valid non-location scan needs a location, staging now opens the location selector immediately instead of leaving the operator on the main scan field
      - Wrap and Parts keep the selected location until the operator changes department or chooses a different location
      - Roll resets the current location after each successful scan
      - staging location selection uses a near-full-height centered modal with compact tabs and location cards to reduce scrolling on large location lists
      - Freeport Roll location selection adds a second tab row by the next alphabetic segment after the first letter, with an `All` fallback bucket
  loading:
    status: live with mixed-source support
    entry_flow:
      - Dropsheets
      - Select Category
      - Loader selection
      - Loader session creation
      - Loading
    rules:
      - Select Category uses compact operational summary/status cards, tighter panel/card padding, three-up department handoff cards on iPad, compact loader roster cards, and an in-flow utility action grid so the shared iPad screen avoids oversized rounded shells, loose vertical gaps, and floating footers
      - loading opens on the last available drop and navigates backward numerically by default
      - numeric scans are driver locations only
      - non-numeric scans go through pallet or single-label processing
      - Roll resets the current location after each successful scan
      - loading keeps scan mutations sequential but leaves the main scan field enabled during post-scan work, queues up to 50 raw scans, and drains them only after refreshed drop data has settled
      - loading label scans post to CustomerPortalAPI-PY `/api/barcode-update/process-loading-scan-v2` and can consume returned detail/union/counter refresh rows instead of always making separate post-scan refresh calls
      - loading label lookup, visible unscanned label filtering, direct scan payloads, and retry payloads use the Select Category-selected route `locationId`; returned drop-detail `LocationID` is not the active location source
      - Loading shows selected-location unscanned union rows even when legacy `LoadViewDetail` reports zero labels, scanned, and need-pick counters; the empty-drop message appears only when the active counter source is also zero and there are no visible selected-location union rows
      - loading clears queued scan texts on drop navigation so they cannot submit against a newly selected drop
      - the Loading route title appends the active scanned driver location while selected so operators can confirm the location used by subsequent scans
      - Loading location selection accepts numeric drop areas when DriverLocation is true and does not require department-specific location support
      - the Loading driver-location modal is a compact centered scan-only prompt and does not show the browseable location-list card
      - the Loading screen active workspace uses one compact operational panel with delivery/customer context, department status pills, shortcut actions, scanner input, scanned ID grid, and drop counters arranged for the iPad operational layout while preserving the existing workflow data
      - scanned-item cards show only the barcode or part-list ID in a three-column monospace grid
      - the active drop counter is docked to the bottom of the viewport-height Loading panel and uses 64px arrow buttons plus three blue counter cards for Labels, Scanned, and Need Pick
      - leaving Loading should record loader end time
      - Select Category displays Complete Load only when every live loading category with labels is scanned to 100% and every dropsheet department status is closed as `NA` or `DONE`; if live category availability is unavailable or contains no loading categories with labels, carried dropsheet `percentCompleted >= 1` may be used as the loaded signal; any due, pending, blank, null, or unavailable department status hides the action
      - Complete Load keeps the legacy `/v1/logistics/dropsheet-notify` payload; for transfer dropsheets it then calls `/v1/logistics/dropsheet-transfer-label-export` with `mode: repair_missing_target`, active-target `X-Db`, and `Y-Db: AZURE`
      - Complete Load keeps the confirmation modal open while the two calls run, disables controls, shows the email-sending phase first, and switches to the transfer-label phase only when `transfer=true`
      - Complete Load treats post-notification sync or transfer-export failures as operator warnings rather than resend-worthy errors, and includes available post-send or transfer-export detail in the warning
      - the visible loading label list follows the legacy LocationID contract and shows unscanned rows whose returned LocationID matches the selected route location; CategoryID is not used as a loading department guard because valid legacy rows may return CategoryID 0
      - Loading counter cards use matching barcode-derived active-drop counters from CustomerPortalAPI-PY when available, fall back to the active `LoadViewDetail` row when unavailable or stale, and are not recalculated from `vwLoadLabelsUnion` in Svelte
  support_views:
    status: live
    included:
      - Order Status
      - Move Orders
      - Add Loader
    notes:
      - Dropsheets trailer picker lists dakview-web equipment rows where `equipment_category=Trailers` and `location` equals the active target; selecting an option updates only the dropsheet trailer equipment fields through dakview-web

integrations:
  last_verified_at: 2026-05-07
  verified_against:
    - docs/architecture.md
    - docs/prd.md
    - src/lib/server/proxy.ts
    - package.json
  confidence: high
  backends:
    dst_customer_portal:
      transport: same-origin SvelteKit proxy helper
      target_format: db=Canton|Freeport|Sandbox
    dak_web:
      transport: same-origin SvelteKit proxy helper
      target_format: X-Db CANTON|FREEPORT|SANDBOX
      target_exceptions:
        - equipment lookups use X-Db EQUIPMENT and pass Canton|Freeport|Sandbox as the `location` query filter
        - transfer label export uses active-target X-Db plus Y-Db AZURE
  required_endpoints:
    - POST /v1/scan/process-staging
    - POST /api/barcode-update/process-loading-scan-v2
    - POST /api/barcode-update/loadview-barcode-counters
    - GET /v1/scan/department-status
    - GET /v1/lookup-tables/equipments
    - POST /v1/logistics/dropsheet-notify
    - POST /v1/logistics/dropsheet-transfer-label-export
  required_environment_variables:
    - PUBLIC_SUPABASE_URL
    - PUBLIC_SUPABASE_ANON_KEY
    - DST_PORTAL_URL
    - DAK_WEB_URL
  local_backend_projects:
    - path: /Users/andresdominicci/Projects/CustomerPortalAPI-PY
      rule: inspect allowed; modify only after explicit approval because endpoints may support production
    - path: /Users/andresdominicci/Projects/dakview-web
