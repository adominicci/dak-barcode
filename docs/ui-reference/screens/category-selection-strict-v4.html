      body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm dark:shadow-none border-b border-slate-100">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">Select Category</h1>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">calendar_today</span>
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">schedule</span>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuai3ZfH5Y9_PWkMriYgcTkQuX_8tqXZE57_aQgSLb0mg564QnkK-I_5AzWGbTtHP7T5xlrhyQrzpQ282YLePJ69b2OKoQPTPnGXwXacnxBgAI6WJN7zlw3BXFxoDe60rfLHG_hUdyV1C4HV8w4XkSNgi6kLKCwP4mVm7PhFSoLJwfVGfiRnaeb3GsIB0JPeP4cEZdGUwJ9yms_YU1zVpNwSiC0nReOF1u2U6Az16lbSdz6XTZQoZOEVW8ZnqlI50vKpoJWqf5wvim"/>
</div>
</div>
</div>
</header>
<main class="pt-24 pb-40 px-8 max-w-7xl mx-auto">
<!-- Progress Bar Section - Redesigned per IMAGE_10 -->
<section class="mb-12">
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-2">
<div class="grid grid-cols-6 overflow-hidden rounded-xl">
<!-- Slit -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Slit</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center">DONE</div>
</div>
<!-- Trim -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Trim</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center border-l border-white/20">DONE</div>
</div>
<!-- Wrap -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Wrap</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center border-l border-white/20">DONE</div>
</div>
<!-- Roll -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Roll</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center border-l border-white/20">DONE</div>
</div>
<!-- Parts -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Parts</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center border-l border-white/20">DONE</div>
</div>
<!-- Soffit -->
<div class="flex flex-col">
<span class="text-[11px] font-bold text-center py-1 text-on-surface-variant uppercase">Soffit</span>
<div class="bg-emerald-500 text-white text-[10px] font-bold py-1.5 text-center border-l border-white/20">NA</div>
</div>
</div>
</div>
</section>
<!-- Delivery Identity Bento -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
<div class="col-span-1 md:col-span-2 bg-surface-container-lowest p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-center">
<div>
<h2 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2">David Schmidt</h2>
<p class="text-primary font-semibold text-lg">Delivery #03202026-0108</p>
</div>
</div>
<div class="bg-primary text-white p-8 rounded-[2rem] industrial-gradient shadow-xl shadow-blue-900/10 flex flex-col justify-center items-center text-center">
<span class="text-blue-100 text-sm font-bold uppercase tracking-widest mb-2">Total Weight</span>
<div class="text-5xl font-black">2152.4</div>
<span class="text-xl font-medium opacity-80">lbs</span>
</div>
</div>
<!-- Category Selection List - Expanded Full Width -->
<div class="flex flex-col gap-6">
<button class="relative group overflow-hidden flex items-center justify-center p-12 bg-emerald-500 rounded-[2rem] shadow-sm hover:shadow-md transition-all active:scale-[0.99] w-full text-white">
<div class="relative z-10 flex flex-col items-center">
<span class="text-4xl font-black uppercase tracking-tight">Wrap</span>
<span class="mt-2 text-lg font-bold opacity-90">100% DONE</span>
</div>
</button>
<button class="relative group overflow-hidden flex items-center justify-center p-12 bg-emerald-500 rounded-[2rem] shadow-sm hover:shadow-md transition-all active:scale-[0.99] w-full text-white">
<div class="relative z-10 flex flex-col items-center">
<span class="text-4xl font-black uppercase tracking-tight">Parts</span>
<span class="mt-2 text-lg font-bold opacity-90">100% DONE</span>
</div>
</button>
<button class="relative group overflow-hidden flex items-center justify-center p-12 bg-emerald-500 rounded-[2rem] shadow-sm hover:shadow-md transition-all active:scale-[0.99] w-full text-white">
<div class="relative z-10 flex flex-col items-center">
<span class="text-4xl font-black uppercase tracking-tight">Roll</span>
<span class="mt-2 text-lg font-bold opacity-90">100% DONE</span>
</div>
</button>
</div>
</main>
<!-- Persistent Bottom Footer NavBar -->
<footer class="fixed bottom-0 left-0 right-0 z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur-2xl border-t border-slate-200/60 dark:border-slate-700/60 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
<div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">
<button class="flex items-center gap-3 text-slate-700 dark:text-slate-200 px-6 py-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition-all">
<span class="material-symbols-outlined">assignment</span>
<span class="text-sm font-bold tracking-wide uppercase">Order Status</span>
</button>
<button class="flex items-center gap-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl px-12 py-5 shadow-xl shadow-blue-500/25 active:scale-95 transition-all transform -translate-y-2">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-lg font-black tracking-widest uppercase">Complete Load</span>
</button>
<button class="flex items-center gap-3 text-slate-700 dark:text-slate-200 px-6 py-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition-all">
<span class="material-symbols-outlined">list_alt</span>
<span class="text-sm font-bold tracking-wide uppercase">Dropsheet</span>
</button>
</div>
</footer>
